<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elsewhere</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #faf9f7;
    color: #1a1a1a;
    margin: 0;
    padding: 2rem 1rem;
    min-height: 100vh;
  }
  .container {
    max-width: 720px;
    margin: 0 auto;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: 28px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.02em;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin: 4px 0 0;
  }
  .unit-toggle {
    font-size: 13px;
    color: #555;
    background: white;
    border: 1px solid #ddd;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  .unit-toggle:hover { background: #f0eee9; }

  .search-wrapper {
    position: relative;
    margin-bottom: 1.5rem;
  }
  #city-input {
    width: 100%;
    padding: 12px 16px;
    font-size: 15px;
    font-family: inherit;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: white;
    color: #1a1a1a;
  }
  #city-input:focus {
    outline: none;
    border-color: #999;
    box-shadow: 0 0 0 3px rgba(0,0,0,0.05);
  }
  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: white;
    border: 1px solid #ddd;
    border-radius: 8px;
    max-height: 320px;
    overflow-y: auto;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    z-index: 1000;
  }
  .suggestion {
    padding: 12px 16px;
    cursor: pointer;
    font-size: 14px;
    border-bottom: 1px solid #eee;
    background: white;
  }
  .suggestion:last-child { border-bottom: none; }
  .suggestion:hover { background: #f5f3ee; }
  .place-name { font-weight: 500; color: #1a1a1a; }
  .place-region { color: #888; font-size: 13px; margin-left: 8px; }

  .cities-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
  }
  .city-card {
    background: white;
    border: 1px solid #e5e2db;
    border-radius: 12px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    position: relative;
    transition: border-color 0.15s;
  }
  .city-card:hover {
    border-color: #ccc;
  }
  .card-left { flex: 1; min-width: 0; }
  .city-title { font-size: 18px; font-weight: 500; margin: 0; color: #1a1a1a; }
  .city-sub { font-size: 13px; color: #888; margin: 2px 0 0; }
  .city-time { font-size: 28px; font-weight: 500; margin: 10px 0 0; color: #1a1a1a; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
  .city-date { font-size: 13px; color: #aaa; margin: 2px 0 0; }
  .card-right { text-align: right; flex-shrink: 0; }
  .city-temp { font-size: 24px; font-weight: 500; margin: 0; color: #1a1a1a; font-variant-numeric: tabular-nums; }
  .city-weather { font-size: 13px; color: #888; margin: 2px 0 0; }
  .city-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    justify-content: flex-end;
  }
  .scenery-link {
    font-size: 12px;
    color: #555;
    text-decoration: none;
    padding: 4px 10px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: white;
  }
  .scenery-link:hover { background: #f0eee9; color: #1a1a1a; }
  .remove-btn {
    font-size: 12px;
    color: #888;
    background: white;
    border: 1px solid #ddd;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-family: inherit;
  }
  .remove-btn:hover { background: #fdf0ee; color: #a33; border-color: #d99; }
  .empty-state {
    text-align: center;
    padding: 48px 16px;
    color: #aaa;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div>
      <h1>Elsewhere</h1>
      <p class="subtitle">Where you are. Where you've been. Where you might go.</p>
    </div>
    <button class="unit-toggle" id="unit-toggle">°C</button>
  </div>

  <div class="search-wrapper">
    <input type="text" id="city-input" placeholder="Add a city..." autocomplete="off">
    <div class="suggestions" id="suggestions" style="display: none;"></div>
  </div>

  <div class="cities-grid" id="cities-list"></div>
</div>

<script>
(function() {
  const STORAGE_KEY = 'elsewhere_cities_v1';
  const UNIT_KEY = 'elsewhere_unit_v1';
  const WEATHER_CODES = {
    0: 'Clear', 1: 'Mostly clear', 2: 'Partly cloudy', 3: 'Overcast',
    45: 'Foggy', 48: 'Foggy',
    51: 'Light drizzle', 53: 'Drizzle', 55: 'Heavy drizzle',
    61: 'Light rain', 63: 'Rain', 65: 'Heavy rain',
    71: 'Light snow', 73: 'Snow', 75: 'Heavy snow', 77: 'Snow grains',
    80: 'Light showers', 81: 'Showers', 82: 'Heavy showers',
    85: 'Snow showers', 86: 'Heavy snow showers',
    95: 'Thunderstorm', 96: 'Thunderstorm with hail', 99: 'Thunderstorm with hail'
  };

  let cities = [];
  let unit = 'C';
  let searchTimeout = null;

  try { cities = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { cities = []; }
  try { unit = localStorage.getItem(UNIT_KEY) || 'C'; } catch(e) {}

  const input = document.getElementById('city-input');
  const suggestionsEl = document.getElementById('suggestions');
  const listEl = document.getElementById('cities-list');
  const unitToggle = document.getElementById('unit-toggle');

  function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cities)); } catch(e) {} }
  function saveUnit() { try { localStorage.setItem(UNIT_KEY, unit); } catch(e) {} }

  function formatTime(timezone) {
    try {
      const now = new Date();
      const time = new Intl.DateTimeFormat('en-GB', { timeZone: timezone, hour: '2-digit', minute: '2-digit', hour12: false }).format(now);
      const date = new Intl.DateTimeFormat('en-GB', { timeZone: timezone, weekday: 'short', day: 'numeric', month: 'short' }).format(now);
      return { time, date };
    } catch(e) { return { time: '—', date: '' }; }
  }

  function formatTemp(c) {
    if (c === null || c === undefined) return '—';
    if (unit === 'F') return Math.round(c * 9/5 + 32) + '°F';
    return Math.round(c) + '°C';
  }

  function pixabayUrl(city) {
    const parts = [city.name, city.region, city.country].filter(Boolean).join(', ') + ' scenery';
    return 'https://pixabay.com/images/search/' + encodeURIComponent(parts) + '/';
  }

  function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function render() {
    if (cities.length === 0) {
      listEl.innerHTML = '<div class="empty-state">No places yet. Start typing above.</div>';
      return;
    }
    listEl.innerHTML = cities.map((city, idx) => {
      const { time, date } = formatTime(city.timezone);
      const weather = city.weather || {};
      const desc = weather.code !== undefined ? (WEATHER_CODES[weather.code] || 'Unknown') : 'Loading…';
      const temp = weather.temp !== undefined ? formatTemp(weather.temp) : '—';
      return `
        <div class="city-card">
          <div class="card-left">
            <p class="city-title">${escapeHtml(city.name)}</p>
            <p class="city-sub">${escapeHtml(city.region || '')}${city.region && city.country ? ', ' : ''}${escapeHtml(city.country || '')}</p>
            <p class="city-time">${time}</p>
            <p class="city-date">${date}</p>
          </div>
          <div class="card-right">
            <p class="city-temp">${temp}</p>
            <p class="city-weather">${desc}</p>
            <div class="city-actions">
              <a class="scenery-link" href="${pixabayUrl(city)}" target="_blank" rel="noopener noreferrer">See scenery</a>
              <button class="remove-btn" data-idx="${idx}">Remove</button>
            </div>
          </div>
        </div>
      `;
    }).join('');
    listEl.querySelectorAll('.remove-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.getAttribute('data-idx'));
        cities.splice(idx, 1);
        save();
        render();
      });
    });
  }

  async function fetchWeather(city) {
    try {
      const url = 'https://api.open-meteo.com/v1/forecast?latitude=' + city.lat +
                  '&longitude=' + city.lon +
                  '&current=temperature_2m,weather_code&timezone=' + encodeURIComponent(city.timezone);
      const res = await fetch(url);
      if (!res.ok) throw new Error('Weather fetch failed');
      const data = await res.json();
      city.weather = { temp: data.current.temperature_2m, code: data.current.weather_code };
      save();
      render();
    } catch(e) {
      city.weather = { temp: null, code: undefined };
      render();
    }
  }

  async function searchCities(query) {
    if (!query || query.length < 2) { suggestionsEl.style.display = 'none'; return; }
    try {
      const res = await fetch('https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(query) + '&count=8&language=en&format=json');
      const data = await res.json();
      const results = data.results || [];
      if (results.length === 0) { suggestionsEl.style.display = 'none'; return; }
      suggestionsEl.innerHTML = results.map((r, idx) => `
        <div class="suggestion" data-idx="${idx}">
          <span class="place-name">${escapeHtml(r.name)}</span>
          <span class="place-region">${escapeHtml(r.admin1 || '')}${r.admin1 && r.country ? ', ' : ''}${escapeHtml(r.country || '')}</span>
        </div>
      `).join('');
      suggestionsEl.style.display = 'block';
      suggestionsEl.querySelectorAll('.suggestion').forEach(el => {
        el.addEventListener('mousedown', (ev) => {
          ev.preventDefault();
          const idx = parseInt(el.getAttribute('data-idx'));
          const r = results[idx];
          const newCity = {
            name: r.name, region: r.admin1 || '', country: r.country || '',
            lat: r.latitude, lon: r.longitude, timezone: r.timezone || 'UTC'
          };
          cities.push(newCity);
          save();
          input.value = '';
          suggestionsEl.style.display = 'none';
          render();
          fetchWeather(newCity);
        });
      });
    } catch(e) {
      suggestionsEl.style.display = 'none';
    }
  }

  input.addEventListener('input', (e) => {
    clearTimeout(searchTimeout);
    const q = e.target.value.trim();
    searchTimeout = setTimeout(() => searchCities(q), 250);
  });
  input.addEventListener('blur', () => { setTimeout(() => suggestionsEl.style.display = 'none', 150); });
  input.addEventListener('focus', () => { if (input.value.trim().length >= 2) searchCities(input.value.trim()); });

  unitToggle.textContent = '°' + unit;
  unitToggle.addEventListener('click', () => {
    unit = unit === 'C' ? 'F' : 'C';
    unitToggle.textContent = '°' + unit;
    saveUnit();
    render();
  });

  render();
  cities.forEach(c => fetchWeather(c));
  setInterval(render, 30000);
})();
</script>
</body>
</html>
